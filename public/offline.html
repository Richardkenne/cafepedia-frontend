<!DOCTYPE html>
<html lang="en-ID">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Cafepedia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; background: #fff; color: #1a1a1a;
      -webkit-font-smoothing: antialiased; padding: 24px;
    }
    .container { text-align: center; max-width: 320px; }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #6b6b6b; line-height: 1.6; margin-bottom: 24px; }
    button {
      padding: 12px 32px; border-radius: 12px; border: none;
      background: #1a1a1a; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; min-height: 48px;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#9749;</div>
    <h1>You're offline</h1>
    <p>Check your connection and try again. Your favorite cafes will be here when you're back.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
